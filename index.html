<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITC Kintone Project Portal</title>
    <!-- Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --secondary: #ec4899;
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --card-hover: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Ambient Background */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            z-index: -1;
        }

        .blob {
            position: absolute;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        .blob-1 {
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
        }

        .blob-2 {
            bottom: -10%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, var(--secondary) 0%, transparent 70%);
            animation-delay: -10s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(5%, 10%) scale(1.1);
            }

            100% {
                transform: translate(-5%, -5%) scale(0.9);
            }
        }

        .container {
            max-width: 900px;
            width: 100%;
            z-index: 1;
            text-align: center;
        }

        header {
            margin-bottom: 4rem;
            animation: fade-in-up 1s ease-out forwards;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        p.subtitle {
            font-size: 1.2rem;
            color: #94a3b8;
            font-weight: 300;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            animation: fade-in-up 1s ease-out 0.3s forwards;
            opacity: 0;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            text-decoration: none;
            color: var(--text-color);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.08), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .card:hover {
            transform: translateY(-10px);
            background: var(--card-hover);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 40px rgba(79, 70, 229, 0.2);
        }

        .card:hover::before {
            transform: translateX(100%);
        }

        .card-icon {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card h2 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .card p {
            color: #cbd5e1;
            font-size: 1rem;
            font-weight: 300;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            flex-grow: 1;
        }

        .card-action {
            display: flex;
            align-items: center;
            font-weight: 600;
            color: #a5b4fc;
            transition: color 0.3s;
            margin-top: auto;
            font-size: 1.05rem;
        }

        .card-action svg {
            width: 20px;
            height: 20px;
            margin-left: 8px;
            transition: transform 0.3s;
        }

        .card:hover .card-action {
            color: #ffffff;
        }

        .card:hover .card-action svg {
            transform: translateX(6px);
        }

        /* Date Badges */
        .date-badge {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #e2e8f0;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Animations */
        @keyframes fade-in-up {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .card {
                padding: 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="ambient-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <header>
            <h1>ITC Kintone Portal</h1>
            <p class="subtitle">プロジェクトの関連ドキュメントと最新状況をご確認いただけます</p>
        </header>

        <div class="grid">
            <!-- Card 1 -->
            <a href="260119_kujime_explanation.html" class="card">
                <span class="date-badge">2026.01.19</span>
                <div class="card-icon">🎯</div>
                <h2>BCセンターからKintoneへの<br>情報連携効率化ツールご提案</h2>
                <p>久次米様へのご説明資料です。Kintone連携の仕組み、現状の課題解決、将来のビジョンについてスライド形式でまとめています。</p>
                <div class="card-action">
                    資料を見る
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                    </svg>
                </div>
            </a>

            <!-- Card 2 -->
            <a href="260302_dev_status.html" class="card">
                <span class="date-badge">2026.03.02</span>
                <div class="card-icon">🚀</div>
                <h2>Kintone改修 対策状況<br>（2026年3月）</h2>
                <p>最新の開発進捗状況や、複数選択肢・郵便番号自動取得などの各技術的課題に対する具体的な対策方針を記録しています。</p>
                <div class="card-action">
                    状況を確認する
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                    </svg>
                </div>
            </a>
        </div>
    </div>
</body>

</html>
